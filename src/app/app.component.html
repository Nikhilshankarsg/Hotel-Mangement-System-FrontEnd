<nav class="navbar" *ngIf="isAdminPage">

  <!-- Left Side: Logo & Links -->
  <div class="nav-left">
    <div class="brand">
      <span class="brand-icon">🏨</span>
      <span class="brand-text">Hotel Admin</span>
    </div>

    <div class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/rooms" routerLinkActive="active">Rooms</a>
      <a routerLink="/checkinout" routerLinkActive="active">Check-In / Out</a>
    </div>
  </div>

  <!-- Right Side: Profile & Actions -->
  <div class="nav-right">
    <div class="user-profile">
      <div class="avatar">{{ userInitials }}</div>
      <span class="user-name">{{ auth.getFullName() }}</span>
    </div>

    <button class="logout-btn" (click)="logout()" title="Logout">
      <!-- Logout Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      <span>Logout</span>
    </button>
  </div>

</nav>

<!-- Main content wrapper to ensure padding below the fixed navbar if needed -->
<main class="app-content">
  <router-outlet></router-outlet>
</main>

<app-chatbot *ngIf="isAdminPage"></app-chatbot>
