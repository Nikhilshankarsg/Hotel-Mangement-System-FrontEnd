<p>Total Rooms: {{ rooms.length }}</p>
<div class="container">
  <div class="header-row">
    <h1>Room Management</h1>
    <button class="btn btn-primary" (click)="openAddForm()">+ Add Room</button>
  </div>

  <div class="error" *ngIf="error">{{ error }}</div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Room No.</th>
          <th>Type</th>
          <th>Floor</th>
          <th>Price/Night</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let room of rooms">
          <td>{{ room.roomNumber }}</td>
          <td>{{ room.roomType }}</td>
          <td>{{ room.floorNumber }}</td>
          <td>₹{{ room.pricePerNight }}</td>
          <td><span [ngClass]="badgeClass(room.status)">{{ room.status }}</span></td>
          <td class="actions">
            <button class="btn btn-secondary" (click)="openEditForm(room)">Edit</button>
            <button class="btn btn-secondary" *ngIf="room.status !== 'OCCUPIED'" (click)="toggleMaintenance(room)">
              {{ room.status === 'MAINTENANCE' ? 'Mark Available' : 'Mark Maintenance' }}
            </button>
            <button class="btn btn-danger" *ngIf="room.status !== 'OCCUPIED'" (click)="deleteRoom(room)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Add / Edit Modal -->
  <div class="modal-backdrop" *ngIf="showForm" (click)="showForm = false">
    <div class="card modal" (click)="$event.stopPropagation()">
      <h3>{{ editingId ? 'Edit Room' : 'Add Room' }}</h3>

      <label>Room Number</label>
      <input type="text" [(ngModel)]="form.roomNumber" name="roomNumber" />

      <label>Room Type</label>
      <select [(ngModel)]="form.roomType" name="roomType">
        <option value="SINGLE">Single</option>
        <option value="DOUBLE">Double</option>
        <option value="DELUXE">Deluxe</option>
        <option value="SUITE">Suite</option>
      </select>

      <label>Floor Number</label>
      <input type="number" [(ngModel)]="form.floorNumber" name="floorNumber" />

      <label>Price per Night (₹)</label>
      <input type="number" [(ngModel)]="form.pricePerNight" name="pricePerNight" />

      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="showForm = false">Cancel</button>
        <button class="btn btn-primary" (click)="saveRoom()">Save</button>
      </div>
    </div>
  </div>
</div>
